<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohsin Studio — Order Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b;
    --surface:#141311;
    --surface-2:#1c1a16;
    --surface-3:#242019;
    --gold:#c9a24d;
    --gold-soft:#e8cd8a;
    --gold-dim:rgba(201,162,77,0.35);
    --text:#ece7dc;
    --muted:#948d7c;
    --pending:#c07a3e;
    --confirmed:#c9a24d;
    --done:#6d7a63;
    --border:rgba(201,162,77,0.16);
    --danger:#a24b3f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,162,77,0.07), transparent),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding:32px 20px 60px;
  }
  .wrap{max-width:920px; margin:0 auto;}

  /* Header */
  .header{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom:34px; flex-wrap:wrap; gap:16px;
    border-bottom:1px solid var(--border);
    padding-bottom:22px;
  }
  .brand-eyebrow{
    font-size:11px; letter-spacing:3px; text-transform:uppercase;
    color:var(--gold); font-weight:600; margin-bottom:6px;
  }
  .brand-title{
    font-family:'Playfair Display', serif; font-size:30px; font-weight:600;
    letter-spacing:0.3px;
  }
  .brand-sub{ color:var(--muted); font-size:13px; margin-top:4px;}
  .new-order-btn{
    background:linear-gradient(135deg, var(--gold-soft), var(--gold));
    color:#161208; border:none; padding:12px 22px; border-radius:2px;
    font-weight:700; font-size:13px; letter-spacing:0.5px; cursor:pointer;
    text-transform:uppercase; transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .new-order-btn:hover{ transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,162,77,0.25);}
  .new-order-btn:focus-visible{ outline:2px solid var(--gold-soft); outline-offset:2px;}

  /* Month nav */
  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .month-label{
    font-family:'Playfair Display', serif; font-size:22px; font-weight:600;
  }
  .nav-btns{display:flex; gap:8px;}
  .nav-btn{
    background:var(--surface-2); border:1px solid var(--border); color:var(--gold-soft);
    width:36px; height:36px; border-radius:2px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .nav-btn:hover{ background:var(--surface-3); border-color:var(--gold-dim);}
  .nav-btn:focus-visible{ outline:2px solid var(--gold-soft); outline-offset:1px;}

  /* Legend */
  .legend{ display:flex; gap:18px; margin-bottom:20px; flex-wrap:wrap;}
  .legend-item{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted);}
  .legend-dot{ width:8px; height:8px; border-radius:50%; }

  /* Calendar grid */
  .weekdays{
    display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:6px;
  }
  .weekday{
    text-align:center; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted); padding-bottom:6px; font-weight:600;
  }
  .calendar-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
  }
  .day-cell{
    aspect-ratio:1/0.82;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:3px;
    padding:8px;
    cursor:pointer;
    display:flex; flex-direction:column; justify-content:space-between;
    transition:border-color 0.15s ease, background 0.15s ease;
    position:relative;
  }
  .day-cell:hover{ border-color:var(--gold-dim); background:var(--surface-2);}
  .day-cell:focus-visible{ outline:2px solid var(--gold-soft); outline-offset:1px;}
  .day-cell.empty{ background:transparent; border:none; cursor:default; pointer-events:none;}
  .day-cell.today{ border-color:var(--gold); box-shadow:inset 0 0 0 1px var(--gold);}
  .day-cell.selected{ background:var(--surface-3); border-color:var(--gold);}
  .day-num{ font-size:13px; color:var(--text); font-weight:500;}
  .day-cell.today .day-num{ color:var(--gold-soft); font-weight:700;}
  .day-dots{ display:flex; gap:4px; flex-wrap:wrap;}
  .day-dot{ width:7px; height:7px; border-radius:50%; }
  .day-count{
    position:absolute; top:6px; right:7px; font-size:10px; color:var(--gold-soft);
    font-weight:700; background:rgba(201,162,77,0.12); border-radius:50%;
    width:16px; height:16px; display:flex; align-items:center; justify-content:center;
  }

  /* Detail panel */
  .panel{
    margin-top:28px; background:var(--surface); border:1px solid var(--border);
    border-radius:4px; padding:22px; display:none;
  }
  .panel.open{ display:block; }
  .panel-header{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:16px; flex-wrap:wrap; gap:10px;
  }
  .panel-title{ font-family:'Playfair Display', serif; font-size:19px; font-weight:600;}
  .panel-add-btn{
    background:transparent; border:1px solid var(--gold-dim); color:var(--gold-soft);
    padding:8px 14px; border-radius:2px; font-size:12px; cursor:pointer; font-weight:600;
    letter-spacing:0.3px; transition:background 0.15s ease;
  }
  .panel-add-btn:hover{ background:rgba(201,162,77,0.08); }
  .empty-state{ color:var(--muted); font-size:13px; padding:20px 0; text-align:center; }

  .order-card{
    background:var(--surface-2); border:1px solid var(--border); border-radius:3px;
    padding:14px 16px; margin-bottom:10px;
    display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
  }
  .order-info{ flex:1; }
  .order-top{ display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap;}
  .order-client{ font-weight:600; font-size:14px; }
  .order-type-tag{
    font-size:10px; text-transform:uppercase; letter-spacing:0.5px; padding:2px 7px;
    border-radius:2px; border:1px solid var(--border); color:var(--muted); font-weight:600;
  }
  .order-title{ font-size:13px; color:var(--muted); margin-bottom:6px; }
  .order-meta{ font-size:12px; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap;}
  .status-badge{
    font-size:11px; padding:3px 9px; border-radius:20px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.4px; white-space:nowrap;
    border:1px solid transparent;
  }
  .status-pending{ background:rgba(192,122,62,0.15); color:var(--pending); border-color:rgba(192,122,62,0.35);}
  .status-confirmed{ background:rgba(201,162,77,0.15); color:var(--gold-soft); border-color:rgba(201,162,77,0.35);}
  .status-done{ background:rgba(109,122,99,0.18); color:#a3ad97; border-color:rgba(109,122,99,0.4);}
  .order-actions{ display:flex; flex-direction:column; gap:6px; align-items:flex-end;}
  .icon-btn{
    background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px;
    padding:2px 4px; text-decoration:underline; transition:color 0.15s ease;
  }
  .icon-btn:hover{ color:var(--gold-soft); }
  .icon-btn.danger:hover{ color:var(--danger); }

  /* Modal */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
    align-items:center; justify-content:center; z-index:100; padding:20px;
    backdrop-filter:blur(2px);
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    padding:28px; max-width:440px; width:100%; max-height:88vh; overflow-y:auto;
  }
  .modal-title{ font-family:'Playfair Display', serif; font-size:19px; margin-bottom:20px; font-weight:600;}
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted); margin-bottom:6px; font-weight:600;
  }
  .field input, .field select, .field textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--border);
    color:var(--text); padding:10px 12px; border-radius:2px; font-size:13px;
    font-family:'Inter', sans-serif;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--gold); background:var(--surface-3);
  }
  .field textarea{ resize:vertical; min-height:60px; }
  .type-toggle{ display:flex; gap:8px; }
  .type-btn{
    flex:1; padding:10px; background:var(--surface-2); border:1px solid var(--border);
    color:var(--muted); cursor:pointer; border-radius:2px; font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.3px; transition:all 0.15s ease;
  }
  .type-btn.active{ background:rgba(201,162,77,0.12); border-color:var(--gold); color:var(--gold-soft);}
  .status-toggle{ display:flex; gap:8px; }
  .status-btn{
    flex:1; padding:9px; background:var(--surface-2); border:1px solid var(--border);
    cursor:pointer; border-radius:2px; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.3px; transition:all 0.15s ease; color:var(--muted);
  }
  .status-btn.active-pending{ background:rgba(192,122,62,0.15); border-color:var(--pending); color:var(--pending);}
  .status-btn.active-confirmed{ background:rgba(201,162,77,0.15); border-color:var(--gold); color:var(--gold-soft);}
  .status-btn.active-done{ background:rgba(109,122,99,0.18); border-color:var(--done); color:#a3ad97;}
  .modal-actions{ display:flex; gap:10px; margin-top:22px; }
  .btn-primary{
    flex:1; background:linear-gradient(135deg, var(--gold-soft), var(--gold));
    color:#161208; border:none; padding:12px; border-radius:2px; font-weight:700;
    font-size:13px; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px;
  }
  .btn-secondary{
    flex:1; background:transparent; border:1px solid var(--border); color:var(--muted);
    padding:12px; border-radius:2px; font-weight:600; font-size:13px; cursor:pointer;
  }
  .btn-secondary:hover{ color:var(--text); border-color:var(--gold-dim); }

  .loading-msg, .error-msg{ text-align:center; color:var(--muted); padding:40px 0; font-size:13px; }
  .error-msg{ color:var(--danger); }

  @media (max-width:520px){
    .brand-title{ font-size:24px; }
    .day-cell{ padding:5px; }
    .day-num{ font-size:11px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="brand-eyebrow">Mohsin Studio</div>
      <div class="brand-title">Order Tracker</div>
      <div class="brand-sub">Private — bookings &amp; product orders at a glance</div>
    </div>
    <button class="new-order-btn" id="openNewOrder">+ New Order</button>
  </div>

  <div class="month-nav">
    <div class="month-label" id="monthLabel">—</div>
    <div class="nav-btns">
      <button class="nav-btn" id="prevMonth" aria-label="Previous month">‹</button>
      <button class="nav-btn" id="todayBtn" aria-label="Jump to today" style="width:auto; padding:0 12px; font-size:11px; letter-spacing:0.5px; text-transform:uppercase; font-weight:700;">Today</button>
      <button class="nav-btn" id="nextMonth" aria-label="Next month">›</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--pending)"></span>Pending</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--confirmed)"></span>Confirmed</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--done)"></span>Done</div>
  </div>

  <div class="weekdays" id="weekdays"></div>
  <div class="calendar-grid" id="calendarGrid">
    <div class="loading-msg">Loading calendar…</div>
  </div>

  <div class="panel" id="detailPanel">
    <div class="panel-header">
      <div class="panel-title" id="panelDate">—</div>
      <button class="panel-add-btn" id="panelAddBtn">+ Add order for this date</button>
    </div>
    <div id="panelOrders"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Order</div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="fieldDate">
    </div>
    <div class="field">
      <label>Order Type</label>
      <div class="type-toggle">
        <button type="button" class="type-btn active" data-type="booking" id="typeBookingBtn">Booking</button>
        <button type="button" class="type-btn" data-type="product" id="typeProductBtn">Product Order</button>
      </div>
    </div>
    <div class="field">
      <label id="clientLabel">Client Name</label>
      <input type="text" id="fieldClient" placeholder="e.g. Ayesha Khan">
    </div>
    <div class="field">
      <label>Phone (optional)</label>
      <input type="text" id="fieldPhone" placeholder="03xx-xxxxxxx">
    </div>
    <div class="field">
      <label id="titleLabel">Shoot / Package</label>
      <input type="text" id="fieldTitle" placeholder="e.g. Bridal Shoot — Gold Package">
    </div>
    <div class="field">
      <label>Amount (Rs, optional)</label>
      <input type="text" id="fieldAmount" placeholder="e.g. 45,000">
    </div>
    <div class="field">
      <label>Status</label>
      <div class="status-toggle">
        <button type="button" class="status-btn" data-status="pending" id="statusPendingBtn">Pending</button>
        <button type="button" class="status-btn" data-status="confirmed" id="statusConfirmedBtn">Confirmed</button>
        <button type="button" class="status-btn" data-status="done" id="statusDoneBtn">Done</button>
      </div>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="fieldNotes" placeholder="Any extra detail…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelModal">Cancel</button>
      <button class="btn-primary" id="saveOrder">Save</button>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'orders-data';
  let orders = [];
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let selectedDate = null;
  let editingId = null;
  let modalType = 'booking';
  let modalStatus = 'pending';

  const grid = document.getElementById('calendarGrid');
  const weekdaysEl = document.getElementById('weekdays');
  const monthLabel = document.getElementById('monthLabel');
  const panel = document.getElementById('detailPanel');
  const panelDate = document.getElementById('panelDate');
  const panelOrders = document.getElementById('panelOrders');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalTitle = document.getElementById('modalTitle');

  const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function pad(n){ return n.toString().padStart(2,'0'); }
  function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
  function todayKey(){ const t=new Date(); return dateKey(t.getFullYear(), t.getMonth(), t.getDate()); }

  weekdaysEl.innerHTML = WEEKDAYS.map(w => `<div class="weekday">${w}</div>`).join('');

  async function loadOrders(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      orders = raw ? JSON.parse(raw) : [];
    }catch(e){
      orders = [];
    }
  }

  async function saveOrders(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    }catch(e){
      console.error('Failed to save orders', e);
      alert('Could not save — please try again.');
    }
  }

  function ordersForDate(key){
    return orders.filter(o => o.date === key);
  }

  function statusColor(status){
    if(status === 'pending') return 'var(--pending)';
    if(status === 'confirmed') return 'var(--confirmed)';
    return 'var(--done)';
  }

  function renderCalendar(){
    monthLabel.textContent = `${MONTHS[currentMonth]} ${currentYear}`;
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const tKey = todayKey();

    let html = '';
    for(let i=0;i<firstDay;i++){
      html += `<div class="day-cell empty"></div>`;
    }
    for(let d=1; d<=daysInMonth; d++){
      const key = dateKey(currentYear, currentMonth, d);
      const dayOrders = ordersForDate(key);
      const isToday = key === tKey;
      const isSelected = key === selectedDate;
      let dotsHtml = '';
      if(dayOrders.length){
        const shown = dayOrders.slice(0,4);
        dotsHtml = `<div class="day-dots">${shown.map(o => `<span class="day-dot" style="background:${statusColor(o.status)}"></span>`).join('')}</div>`;
      } else {
        dotsHtml = `<div class="day-dots"></div>`;
      }
      const countBadge = dayOrders.length ? `<div class="day-count">${dayOrders.length}</div>` : '';
      html += `<div class="day-cell ${isToday?'today':''} ${isSelected?'selected':''}" data-key="${key}" tabindex="0" role="button" aria-label="${key}, ${dayOrders.length} order(s)">
        ${countBadge}
        <div class="day-num">${d}</div>
        ${dotsHtml}
      </div>`;
    }
    grid.innerHTML = html;

    grid.querySelectorAll('.day-cell:not(.empty)').forEach(cell => {
      cell.addEventListener('click', () => selectDate(cell.dataset.key));
      cell.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); selectDate(cell.dataset.key); }
      });
    });
  }

  function selectDate(key){
    selectedDate = key;
    renderCalendar();
    renderPanel();
    panel.classList.add('open');
    panel.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  function renderPanel(){
    if(!selectedDate){ panel.classList.remove('open'); return; }
    const d = new Date(selectedDate + 'T00:00:00');
    panelDate.textContent = d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
    const dayOrders = ordersForDate(selectedDate);

    if(!dayOrders.length){
      panelOrders.innerHTML = `<div class="empty-state">No orders on this date yet.</div>`;
      return;
    }

    panelOrders.innerHTML = dayOrders.map(o => `
      <div class="order-card">
        <div class="order-info">
          <div class="order-top">
            <span class="order-client">${escapeHtml(o.clientName || 'Unnamed')}</span>
            <span class="order-type-tag">${o.type === 'booking' ? 'Booking' : 'Product'}</span>
          </div>
          <div class="order-title">${escapeHtml(o.title || '—')}</div>
          <div class="order-meta">
            ${o.phone ? `<span>${escapeHtml(o.phone)}</span>` : ''}
            ${o.amount ? `<span>Rs ${escapeHtml(o.amount)}</span>` : ''}
          </div>
          ${o.notes ? `<div class="order-meta" style="margin-top:6px;">${escapeHtml(o.notes)}</div>` : ''}
        </div>
        <div class="order-actions">
          <span class="status-badge status-${o.status}">${o.status}</span>
          <button class="icon-btn" data-edit="${o.id}">Edit</button>
          <button class="icon-btn danger" data-delete="${o.id}">Delete</button>
        </div>
      </div>
    `).join('');

    panelOrders.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => openModal(btn.dataset.edit));
    });
    panelOrders.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => deleteOrder(btn.dataset.delete));
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function deleteOrder(id){
    if(!confirm('Delete this order?')) return;
    orders = orders.filter(o => o.id !== id);
    await saveOrders();
    renderCalendar();
    renderPanel();
  }

  // Modal logic
  function setType(type){
    modalType = type;
    document.getElementById('typeBookingBtn').classList.toggle('active', type === 'booking');
    document.getElementById('typeProductBtn').classList.toggle('active', type === 'product');
    document.getElementById('clientLabel').textContent = type === 'booking' ? 'Client Name' : 'Customer Name';
    document.getElementById('titleLabel').textContent = type === 'booking' ? 'Shoot / Package' : 'Product / Item';
    document.getElementById('fieldTitle').placeholder = type === 'booking' ? 'e.g. Bridal Shoot — Gold Package' : 'e.g. Canvas Print A2 x2';
  }

  function setStatus(status){
    modalStatus = status;
    ['pending','confirmed','done'].forEach(s => {
      const btn = document.getElementById(`status${s.charAt(0).toUpperCase()+s.slice(1)}Btn`);
      btn.classList.toggle(`active-${s}`, s === status);
    });
  }

  document.getElementById('typeBookingBtn').addEventListener('click', () => setType('booking'));
  document.getElementById('typeProductBtn').addEventListener('click', () => setType('product'));
  document.getElementById('statusPendingBtn').addEventListener('click', () => setStatus('pending'));
  document.getElementById('statusConfirmedBtn').addEventListener('click', () => setStatus('confirmed'));
  document.getElementById('statusDoneBtn').addEventListener('click', () => setStatus('done'));

  function openModal(editId){
    editingId = editId || null;
    if(editId){
      const o = orders.find(x => x.id === editId);
      if(!o) return;
      modalTitle.textContent = 'Edit Order';
      document.getElementById('fieldDate').value = o.date;
      document.getElementById('fieldClient').value = o.clientName || '';
      document.getElementById('fieldPhone').value = o.phone || '';
      document.getElementById('fieldTitle').value = o.title || '';
      document.getElementById('fieldAmount').value = o.amount || '';
      document.getElementById('fieldNotes').value = o.notes || '';
      setType(o.type || 'booking');
      setStatus(o.status || 'pending');
    } else {
      modalTitle.textContent = 'New Order';
      document.getElementById('fieldDate').value = selectedDate || todayKey();
      document.getElementById('fieldClient').value = '';
      document.getElementById('fieldPhone').value = '';
      document.getElementById('fieldTitle').value = '';
      document.getElementById('fieldAmount').value = '';
      document.getElementById('fieldNotes').value = '';
      setType('booking');
      setStatus('pending');
    }
    modalOverlay.classList.add('open');
    document.getElementById('fieldClient').focus();
  }

  function closeModal(){
    modalOverlay.classList.remove('open');
    editingId = null;
  }

  document.getElementById('cancelModal').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal(); });

  document.getElementById('saveOrder').addEventListener('click', async () => {
    const date = document.getElementById('fieldDate').value;
    const clientName = document.getElementById('fieldClient').value.trim();
    if(!date){ alert('Please pick a date.'); return; }
    if(!clientName){ alert('Please enter a name.'); return; }

    const orderData = {
      id: editingId || (Date.now().toString(36) + Math.random().toString(36).slice(2,7)),
      date,
      type: modalType,
      clientName,
      phone: document.getElementById('fieldPhone').value.trim(),
      title: document.getElementById('fieldTitle').value.trim(),
      amount: document.getElementById('fieldAmount').value.trim(),
      status: modalStatus,
      notes: document.getElementById('fieldNotes').value.trim()
    };

    if(editingId){
      const idx = orders.findIndex(o => o.id === editingId);
      if(idx > -1) orders[idx] = orderData;
    } else {
      orders.push(orderData);
    }

    await saveOrders();
    closeModal();

    const d = new Date(date + 'T00:00:00');
    currentMonth = d.getMonth();
    currentYear = d.getFullYear();
    selectedDate = date;
    renderCalendar();
    renderPanel();
    panel.classList.add('open');
  });

  document.getElementById('openNewOrder').addEventListener('click', () => openModal(null));
  document.getElementById('panelAddBtn').addEventListener('click', () => openModal(null));

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--;
    if(currentMonth < 0){ currentMonth = 11; currentYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++;
    if(currentMonth > 11){ currentMonth = 0; currentYear++; }
    renderCalendar();
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    const t = new Date();
    currentMonth = t.getMonth();
    currentYear = t.getFullYear();
    renderCalendar();
  });

  // Init
  (async function init(){
    await loadOrders();
    renderCalendar();
  })();
})();
</script>
</body>
</html>
